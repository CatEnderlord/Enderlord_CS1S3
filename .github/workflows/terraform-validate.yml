name: Terraform Validate

on:
  pull_request:
    paths:
      - 'v1/dev/**/*.tf'
      - '.github/workflows/terraform-validate.yml'

jobs:
  validate:
    runs-on: ubuntu-latest
    
    steps:
      - uses: actions/checkout@v4
      
      - name: Setup Terraform
        uses: hashicorp/setup-terraform@v2
        with:
          terraform_version: 1.5.0
      
      - name: Terraform Format Check
        run: |
          cd v1/dev
          terraform fmt -check -recursive
      
      - name: Terraform Init (VPC)
        run: |
          cd v1/dev/vpc
          terraform init -backend=false
      
      - name: Terraform Validate (VPC)
        run: |
          cd v1/dev/vpc
          terraform validate
      
      - name: Terraform Init (Database)
        run: |
          cd v1/dev/database
          terraform init -backend=false
      
      - name: Terraform Validate (Database)
        run: |
          cd v1/dev/database
          terraform validate
      
      - name: Terraform Init (Load Balancer)
        run: |
          cd v1/dev/load_balancer
          terraform init -backend=false
      
      - name: Terraform Validate (Load Balancer)
        run: |
          cd v1/dev/load_balancer
          terraform validate
      
      - name: Terraform Init (NAT Gateway)
        run: |
          cd v1/dev/nat_gateway
          terraform init -backend=false
      
      - name: Terraform Validate (NAT Gateway)
        run: |
          cd v1/dev/nat_gateway
          terraform validate
      
      - name: Terraform Init (Auto Scaling)
        run: |
          cd v1/dev/auto_scaling
          terraform init -backend=false
      
      - name: Terraform Validate (Auto Scaling)
        run: |
          cd v1/dev/auto_scaling
          terraform validate
      
      - name: Terraform Init (Monitoring)
        run: |
          cd v1/dev/monitoring
          terraform init -backend=false
      
      - name: Terraform Validate (Monitoring)
        run: |
          cd v1/dev/monitoring
          terraform validate